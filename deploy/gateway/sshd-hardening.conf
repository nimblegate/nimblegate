# nimblegate gateway - sshd hardening drop-in.
#
# Apply with `nimblegate gateway harden-sshd --apply` (writes this to
# /etc/ssh/sshd_config.d/ and runs `sshd -t`), or copy it there by hand.
#
# ⚠ KEEP YOUR CURRENT SSH SESSION OPEN. After reloading sshd, confirm a NEW
#   key-based login works in a separate terminal BEFORE closing this one - a
#   bad sshd config (or missing keys) can lock you out.
#   Reload with: sshd -t && systemctl reload ssh

# Key-only authentication. The gateway is reached via SSH keys in the git user's
# authorized_keys; nothing here needs a password, and disabling password auth
# removes the brute-force surface. Ensure root/admin access is key-based first.
PasswordAuthentication no
KbdInteractiveAuthentication no

# The git user receives pushes via git-shell ONLY. git push/fetch need no pty,
# no forwarding - so deny all of it: an authorized key must not be usable to
# tunnel through the gateway (port/agent forwarding) or open an interactive
# session. Dashboard-added keys also carry `restrict`; this is defence in depth.
Match User git
    AllowTcpForwarding no
    AllowAgentForwarding no
    X11Forwarding no
    PermitTTY no
    PermitTunnel no
