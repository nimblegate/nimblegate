name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: What problem does this solve
      description: Start with the friction, not the proposed solution
    validations: { required: true }
  - type: textarea
    attributes:
      label: Proposed solution (optional)
  - type: checkboxes
    attributes:
      label: Tier
      options:
        - label: "I'd use this in the free tier"
        - label: "I'd consider paying for this when commercial layer ships"
