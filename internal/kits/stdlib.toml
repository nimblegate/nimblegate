# Built-in starter kits shipped with nimblegate (v0.1.0+ schema).
#
# Each kit is a fully-enumerated list of frame IDs. There is NO
# `extends`, NO composition, NO wildcards - kits resolve to a flat
# frame ID list with zero runtime expansion.
#
# Operators apply kits from the dashboard or `nimblegate kits apply
# <name>`. Applying a kit (a) ticks every frame in `frames` into the
# project's `[frames] enabled` list, deduplicated against the
# existing set; and (b) records the kit name in `[ui] applied_kits`
# so the dashboard can render a chip with a × button to clear all
# of it.

[core]
display = "Core"
description = "Universal floor - every project should apply this."
frames = [
    "git/folder-branch-lock",
    "git/no-amend-pushed-commits",
    "git/no-bypass-pre-commit",
    "git/no-force-push-main",
    "commands/apt-purge-preview",
    "commands/curl-pipe-shell",
    "database/migration-script-explicit-env",
    "database/migration-verification-step",
    "database/sqlite-migration-idempotent-wrapper",
    "filesystem/rm-rf-protected-paths",
    "security/no-hardcoded-credentials",
    "security/no-private-keys-in-repo",
    "network/no-localhost-in-proxy-config",
    "database/schema-vs-code-drift",
    "app-correctness/dynamic-env-declared",
]

