[security-strict]
display = "Security strict"
description = "Adds every security/* frame on top of any project-shape kit. Apply additively."
frames = [
    "security/no-hardcoded-credentials",
    "security/no-private-keys-in-repo",
    "security/no-innerHTML-user-input",
    "security/no-mixed-content-urls",
    "security/cf-pages-headers-baseline",
    "security/no-bidi-override",
    "security/no-invisible-tag-chars",
    "security/no-zero-width-in-source",
    "security/no-homoglyph-identifiers",
]

[encoding-strict]
display = "Encoding strict"
description = "Catch invisible / wrong-encoding characters that break parsers or render wrong (BOM, smart quotes, YAML tabs, CRLF on scripts, mixed indent, en-dash flags, non-printable chars, ZWSP in docs). Stackable with any project kit."
frames = [
    "encoding/no-bom",
    "encoding/no-smart-quotes-in-config",
    "encoding/yaml-no-tabs",
    "encoding/consistent-line-endings",
    "encoding/no-mixed-indent",
    "encoding/no-en-dash-in-commands",
    "encoding/no-non-printable",
    "encoding/no-zero-width-in-content",
]
