# v2 stdlib kit catalog - named pre-filled axis-selection bundles operators
# can apply via `nimblegate kits apply <kit_id>`. Each kit holds AXIS SELECTIONS
# (not explicit frame lists); frames flow from the selections at runtime via
# the buckets.Selection resolution chain.
#
# Field schema (per spec §7.1):
#   kit_id       - flat unique identifier (stable across UI display changes)
#   display      - human-readable name for UI surfaces
#   semver       - manually bumped on meaningful change (decision #18)
#   description  - one-line operator-facing summary
#   selections   - table with framework / platform / platform_exclude / domains
#
# Kit IDs use flat naming with UI/CLI duplicate-check at creation time
# (decision #16). Convention: lowercase-hyphenated.
#
# When adding/editing kits:
# - Bump semver on meaningful axis change (added/removed domain, new exclusion)
# - Don't worry about hash - computed at runtime from kit content

[[kit]]
kit_id = "static-cf-pages-marketing"
display = "Static HTML on Cloudflare Pages - Marketing"
semver = "1.0"
description = "Static-site marketing project shipping plain HTML to Cloudflare Pages. myapp-shape default."

  [kit.selections]
  framework = "html"
  platform = "cloudflare"
  domains = ["security", "encoding", "documentation", "html", "seo"]

  [kit.selections.platform_exclude]
  cloudflare = ["cf-workers"]

