<?xml version="1.0" encoding="UTF-8"?>
<!--
  nimblegate icon — particle-orb mark.
  Inspired by Nate Wiley's "Particle Orb CSS" CodePen — adapted to a static
  Fibonacci-sphere distribution of 30 dots, orthographically projected, with
  apparent depth driven by radius + opacity. Centered at (32, 32) inside the
  64×64 viewBox so derived assets (avatar, header) don't appear off-axis when
  scaled. All dots in the locked brand accent (#79c0ff). Transparent
  background so the mark sits cleanly on the dashboard's dark surface
  (#0b0d11) or any light background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="nimblegate">
